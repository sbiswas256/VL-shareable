<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestion Box | VisuaLearning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #e0e5ec;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #3d4468;
        }

        .suggestion-shell {
            width: min(760px, 100%);
            background: #e0e5ec;
            border-radius: 32px;
            padding: 28px;
            box-shadow:
                20px 20px 60px #bec3cf,
                -20px -20px 60px #ffffff;
        }

        .suggestion-layout {
            display: block;
        }

        .panel {
            background: #e0e5ec;
            border-radius: 24px;
            box-shadow:
                inset 8px 8px 18px #c7ccd7,
                inset -8px -8px 18px #f9fcff;
        }

        .form-panel {
            padding: 36px 30px;
        }

        .form-panel h2 {
            font-size: clamp(2rem, 3.6vw, 2.8rem);
            line-height: 1.08;
            margin-bottom: 12px;
            text-align: center;
        }

        .form-intro {
            color: #7f85a3;
            font-size: 1rem;
            line-height: 1.7;
            text-align: center;
        }

        form {
            margin-top: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #6c7293;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .field-shell {
            background: #e0e5ec;
            border-radius: 16px;
            box-shadow:
                inset 8px 8px 16px #bec3cf,
                inset -8px -8px 16px #ffffff;
            transition: box-shadow 0.25s ease;
        }

        .field-shell:focus-within {
            box-shadow:
                inset 4px 4px 8px #bec3cf,
                inset -4px -4px 8px #ffffff;
        }

        input,
        textarea {
            width: 100%;
            border: none;
            background: transparent;
            padding: 16px 18px;
            color: #3d4468;
            font-size: 0.98rem;
            font-family: inherit;
            outline: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: #a2a7c0;
        }

        textarea {
            min-height: 170px;
            resize: vertical;
        }

        .file-shell {
            padding: 14px 16px;
        }

        .file-shell input[type="file"] {
            padding: 0;
            font-size: 0.94rem;
            color: #5f6687;
        }

        .file-shell input[type="file"]::file-selector-button {
            margin-right: 14px;
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            background: #e0e5ec;
            color: #3d4468;
            font-weight: 700;
            cursor: pointer;
            box-shadow:
                6px 6px 14px #bec3cf,
                -6px -6px 14px #ffffff;
        }

        .file-note {
            margin-top: 8px;
            color: #8b91af;
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 16px 24px;
            background: #e0e5ec;
            color: #3d4468;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow:
                10px 10px 22px #bec3cf,
                -10px -10px 22px #ffffff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                12px 12px 24px #bec3cf,
                -12px -12px 24px #ffffff;
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow:
                inset 4px 4px 10px #bec3cf,
                inset -4px -4px 10px #ffffff;
        }

        .success-message {
            display: none;
            margin-top: 18px;
            padding: 16px 18px;
            border-radius: 16px;
            color: #227a5f;
            background: #e0e5ec;
            box-shadow:
                inset 6px 6px 12px #c2d9cf,
                inset -6px -6px 12px #f4fff9;
            line-height: 1.6;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .form-panel {
                padding: 28px 22px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 16px;
            }

            .suggestion-shell {
                padding: 18px;
                border-radius: 24px;
            }

            .panel {
                border-radius: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="suggestion-shell">
        <div class="suggestion-layout">
            <section class="panel form-panel">
                <h2>Suggestion Box</h2>
                <p class="form-intro">Drop your thought, We would love to hear your feedback and suggestions.</p>

                <form id="suggestionForm">
                    <div class="form-row">
                        <div class="form-group">
                            
                            <div class="field-shell">
                                <input type="text" id="name" name="name" placeholder="Your name" required>
                            </div>
                        </div>

                        <div class="form-group">
                           
                            <div class="field-shell">
                                <input type="Phone no" id="Phone no" name="Phone no" placeholder="Phone no" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        
                        <div class="field-shell">
                            <textarea id="suggestion" name="suggestion" placeholder="Share your thoughts and suggestions..." required></textarea>
                        </div>
                    </div>

                    <div class="form-group">
                       
                        <div class="field-shell file-shell">
                            <input type="file" id="attachment" name="attachment" accept="image/*,video/*,audio/*">
                        </div>
                        
                    </div>

                    <button class="submit-btn" type="submit">Submit Suggestion</button>

                    <div class="success-message" id="successMessage">
                        Thank you. Your suggestion has been submitted successfully.
                    </div>
                </form>
            </section>
        </div>
    </div>

    <script>
        document.getElementById('suggestionForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const suggestion = document.getElementById('suggestion').value;
            const attachment = document.getElementById('attachment').files[0] || null;

            console.log('Suggestion submitted:', {
                name,
                email,
                suggestion,
                attachmentName: attachment ? attachment.name : null
            });

            this.reset();

            const successMessage = document.getElementById('successMessage');
            successMessage.style.display = 'block';

            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 4000);
        });
    </script>
</body>
</html>
