<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Login Form</title>
    <script src="../security-vls.js"></script>
</head>

<body>
    <div class="page-shell">
        <header class="topbar reveal">
            <div class="brand">
                <div class="brand-copy">
                    <h1>Login</h1>
                </div>
            </div>
            <nav class="nav-links" aria-label="Page sections">
                <a href="../index.html">Home</a>
                <button id="theme-toggle-header" class="theme-toggle" aria-label="Toggle dark/light mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </nav>
        </header>

        <div class="login-container reveal">
            <div class="login-card">
                <div class="card-layout">
                    <div class="card-panel card-intro">
                        <div class="login-header">
                            <div class="neu-icon">
                                <div class="icon-inner">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                        <circle cx="12" cy="7" r="4" />
                                    </svg>
                                </div>
                            </div>
                            <h2>Welcome Sir</h2>
                            <p>Let's Revolutionize Education together</p>
                        </div>
                        <div class="intro-footer">
                            <div class="divider">
                                <div class="divider-line"></div>
                                <span>Connect with us</span>
                                <div class="divider-line"></div>
                            </div>

                            <div class="social-login">
                                <a class="social-btn neu-social" href="#" target="_blank" rel="noopener noreferrer"
                                    aria-label="Facebook profile link">
                                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                        <path
                                            d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.6 1.7-1.6H16.8V4.8c-.3 0-1.4-.1-2.6-.1-2.6 0-4.4 1.6-4.4 4.5V11H7v3h2.8v8h3.7z" />
                                    </svg>
                                </a>
                                <a class="social-btn neu-social" href="#" target="_blank" rel="noopener noreferrer"
                                    aria-label="YouTube profile link">
                                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                        <path
                                            d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.6 3.6 12 3.6 12 3.6s-7.6 0-9.4.5A3 3 0 0 0 .5 6.2 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.8.5 9.4.5 9.4.5s7.6 0 9.4-.5a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.8zM9.6 15.8V8.2l6.3 3.8-6.3 3.8z" />
                                    </svg>
                                </a>
                                <a class="social-btn neu-social" href="#" target="_blank" rel="noopener noreferrer"
                                    aria-label="Instagram profile link">
                                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                        <path
                                            d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2zm0 1.9A3.9 3.9 0 0 0 3.9 7.8v8.4a3.9 3.9 0 0 0 3.9 3.9h8.4a3.9 3.9 0 0 0 3.9-3.9V7.8a3.9 3.9 0 0 0-3.9-3.9H7.8zm8.9 1.4a1.4 1.4 0 1 1 0 2.8 1.4 1.4 0 0 1 0-2.8zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.9A3.1 3.1 0 1 0 12 15a3.1 3.1 0 0 0 0-6.2z" />
                                    </svg>
                                </a>
                                <a class="social-btn neu-social" href="#" target="_blank" rel="noopener noreferrer"
                                    aria-label="WhatsApp profile link">
                                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                        <path
                                            d="M20.5 3.5A11.8 11.8 0 0 0 1.9 17.7L0 24l6.5-1.7A11.8 11.8 0 1 0 20.5 3.5zm-8.7 18a9.8 9.8 0 0 1-5-1.4l-.4-.2-3.8 1 1-3.7-.3-.4a9.8 9.8 0 1 1 8.5 4.7zm5.4-7.3c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-1 1.2-.4.2-.7.1a8 8 0 0 1-2.4-1.5 8.8 8.8 0 0 1-1.6-2c-.2-.3 0-.5.1-.7l.5-.6.3-.5a.8.8 0 0 0 0-.6c-.1-.2-.7-1.7-1-2.3-.2-.5-.5-.4-.7-.4h-.6a1.2 1.2 0 0 0-.8.4 3.4 3.4 0 0 0-1 2.5 5.8 5.8 0 0 0 1.2 3 13.4 13.4 0 0 0 5.1 4.6 17 17 0 0 0 1.7.6 4.2 4 0 0 0 1.9.1 3.1 3.1 0 0 0 2-1.4 2.4 2.4 0 0 0 .2-1.4c-.1-.1-.3-.2-.6-.3z" />
                                    </svg>
                                </a>
                            </div>

                        </div>
                    </div>

                    <div class="card-panel card-main">
                        <!-- Flip wrapper -->
                        <div class="panel-flip" id="panelFlip">

                            <!-- FRONT: Phone / OTP login (Default) -->
                            <div class="flip-face flip-front">
                                <form class="login-form otp-form" id="otpForm" novalidate>
                                    <div class="otp-header">
                                        <div class="neu-icon otp-icon">
                                            <div class="icon-inner">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                                                    <line x1="12" y1="18" x2="12.01" y2="18" />
                                                </svg>
                                            </div>
                                        </div>
                                        <h2 class="otp-title">Login with OTP</h2>
                                        <p class="otp-subtitle">We'll send a one-time password to your phone</p>
                                    </div>

                                    <div class="form-group">
                                        <div class="input-group neu-input">
                                            <input type="tel" id="phone" name="phone" required autocomplete="tel"
                                                placeholder=" " maxlength="15">
                                            <label for="phone">Phone number</label>
                                            <div class="input-icon">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <path
                                                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.36 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.55a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z" />
                                                </svg>
                                            </div>
                                        </div>
                                        <span class="error-message" id="phoneError"></span>
                                    </div>

                                    <div class="otp-action-area" id="otpActionArea">
                                        <button type="button" class="neu-button send-otp-btn" id="sendOtpBtn">
                                            <span class="btn-text">Send OTP</span>
                                            <div class="btn-loader">
                                                <div class="neu-spinner"></div>
                                            </div>
                                        </button>

                                        <div class="otp-verification-step" id="otpVerificationStep"
                                            style="display: none;">
                                            <div class="form-group otp-input-group" id="otpInputGroup">
                                                <div class="input-group neu-input">
                                                    <input type="text" id="otp" name="otp" required
                                                        autocomplete="one-time-code" placeholder=" " maxlength="6"
                                                        inputmode="numeric">
                                                    <label for="otp">Enter OTP</label>
                                                    <div class="input-icon">
                                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                            stroke-width="2">
                                                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                                        </svg>
                                                    </div>
                                                </div>
                                                <span class="error-message" id="otpError"></span>
                                            </div>

                                            <button type="submit" class="neu-button verify-otp-btn" id="verifyOtpBtn">
                                                <span class="btn-text">Verify &amp; Login</span>
                                                <div class="btn-loader">
                                                    <div class="neu-spinner"></div>
                                                </div>
                                            </button>
                                        </div>
                                        <div class="signup-link">
                                            <p>Login with Email & Password <a href="#" id="passwordFlipTrigger">Click
                                                    here</a></p>
                                        </div>
                                    </div>
                                </form>

                                <div class="success-message" id="successMessage">
                                    <div class="success-icon neu-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                            <polyline points="20 6 9 17 4 12" />
                                        </svg>
                                    </div>
                                    <h3>Success!</h3>
                                    <p>Redirecting to your dashboard...</p>
                                </div>
                            </div>
                            <!-- /FRONT -->

                            <!-- BACK: Email / Password login -->
                            <div class="flip-face flip-back">
                                <form class="login-form" id="loginForm" novalidate>
                                    <div class="form-group">
                                        <div class="input-group neu-input">
                                            <input type="email" id="email" name="email" required autocomplete="email"
                                                placeholder=" ">
                                            <label for="email">Email ID</label>
                                            <div class="input-icon">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <path
                                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                                    <polyline points="22,6 12,13 2,6" />
                                                </svg>
                                            </div>
                                        </div>
                                        <span class="error-message" id="emailError"></span>
                                    </div>

                                    <div class="form-group">
                                        <div class="input-group neu-input password-group">
                                            <input type="password" id="password" name="password" required
                                                autocomplete="current-password" placeholder=" ">
                                            <label for="password">Password</label>
                                            <div class="input-icon">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2">
                                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                                    <path d="M7 11V7a5 5 0 0110 0v4" />
                                                </svg>
                                            </div>
                                            <button type="button" class="password-toggle neu-toggle" id="passwordToggle"
                                                aria-label="Toggle password visibility">
                                                <svg class="eye-open" viewBox="0 0 24 24" fill="none"
                                                    stroke="currentColor" stroke-width="2">
                                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                                    <circle cx="12" cy="12" r="3" />
                                                </svg>
                                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none"
                                                    stroke="currentColor" stroke-width="2">
                                                    <path
                                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                                    <line x1="1" y1="1" x2="23" y2="23" />
                                                </svg>
                                            </button>
                                        </div>
                                        <span class="error-message" id="passwordError"></span>
                                    </div>

                                    <div class="form-options">
                                        <div class="remember-wrapper">
                                            <input type="checkbox" id="remember" name="remember">
                                            <label for="remember" class="checkbox-label">
                                                <div class="neu-checkbox">
                                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                        stroke-width="3">
                                                        <polyline points="20 6 9 17 4 12" />
                                                    </svg>
                                                </div>
                                                Remember me
                                            </label>
                                        </div>
                                        <a href="#" class="forgot-link">Forgot password?</a>
                                    </div>

                                    <button type="submit" class="neu-button login-btn">
                                        <span class="btn-text">Sign In</span>
                                        <div class="btn-loader">
                                            <div class="neu-spinner"></div>
                                        </div>
                                    </button>

                                    <div class="signup-link">
                                        <p>Login with OTP <a href="#" id="otpFlipTrigger">Click here</a></p>
                                    </div>
                                </form>
                            </div>
                            <!-- /BACK -->

                        </div>
                        <!-- /Flip wrapper -->
                    </div>
                </div>
            </div>
        </div>
</body>

<style>
    :root {
        --bg: #e0e5ec;
        --bg-alt: #e8edf3;
        --bg-deep: #d8e0eb;
        --surface: #e9eef5;
        --shadow-dark: #bec3cf;
        --shadow-light: #ffffff;
        --text: #3d4468;
        --muted: #9499b7;
        --accent: #6c7293;
        --accent-soft: rgba(108, 114, 147, 0.18);
        --success: #00c896;
        --shadow-raised: -14px -14px 28px rgba(255, 255, 255, 0.92), 14px 14px 30px rgba(169, 181, 201, 0.42);
        --shadow-pressed: inset -10px -10px 22px rgba(255, 255, 255, 0.78), inset 10px 10px 22px rgba(173, 184, 203, 0.34);
        --max-width: 1280px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(145deg, #dce2ea 0%, var(--bg) 45%, #e7ecf3 100%);
        min-height: 100vh;
        padding: 0;
        line-height: 1.6;
        position: relative;
        overflow-x: hidden;
    }

    body::before,
    body::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(8px);
    }

    body::before {
        width: 320px;
        height: 320px;
        top: -110px;
        left: -80px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.72) 0%, rgba(255, 255, 255, 0) 72%);
    }

    body::after {
        width: 360px;
        height: 360px;
        right: -120px;
        bottom: -150px;
        background: radial-gradient(circle, rgba(108, 114, 147, 0.10) 0%, rgba(108, 114, 147, 0) 74%);
    }

    .page-shell {
        width: min(calc(100% - 40px), var(--max-width));
        margin: 0 auto;
        padding: 26px 0 48px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .topbar {
        position: sticky;
        top: 18px;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 40px;
        padding: 18px 24px;
        border-radius: 999px;
        background: rgba(233, 238, 245, 0.82);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow-raised);
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .brand-copy h1 {
        font-family: Georgia, serif;
        font-size: clamp(1.5rem, 2.4vw, 2rem);
        letter-spacing: 0.03em;
        line-height: 1;
        color: var(--text);
    }

    .nav-links {
        display: flex;
        gap: 12px;
    }

    .nav-links a,
    .theme-toggle {
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--surface);
        box-shadow: var(--shadow-raised);
        font-size: 0.95rem;
        font-weight: 600;
        transition: transform 0.25s ease, color 0.25s ease;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .nav-links a:hover,
    .theme-toggle:hover {
        transform: translateY(-2px);
        color: var(--accent);
    }

    .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
        opacity: 1;
        transform: translateY(0);
    }

    .login-container {
        width: 100%;
        max-width: 1280px;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
    }

    .login-card {
        width: min(100%, 1280px);
        background: linear-gradient(145deg, #e4e9f0, #dce2ea);
        border-radius: 30px;
        padding: 28px;
        box-shadow:
            22px 22px 60px rgba(190, 195, 207, 0.82),
            -22px -22px 60px rgba(255, 255, 255, 0.92);
        position: relative;
        overflow: hidden;
        transform-style: preserve-3d;
        animation: cardEnter 0.75s ease both;
        transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .login-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0), rgba(108, 114, 147, 0.16));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
        pointer-events: none;
    }

    .card-layout {
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.1fr);
        gap: 50px;
        align-items: stretch;
    }

    .card-panel {
        min-width: 0;
    }

    .card-intro,
    .card-main {
        background: linear-gradient(145deg, #e3e8ef, #dde3eb);
        border-radius: 24px;
        box-shadow:
            inset 8px 8px 18px #c7ccd7,
            inset -8px -8px 18px #f9fcff;
        position: relative;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card-intro {
        padding: 34px 28px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 24px;
    }

    .card-main {
        padding: 34px 30px;
        perspective: 1200px;
    }

    /* ── Flip mechanics ── */
    .panel-flip {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 380px;
        transform-style: preserve-3d;
        transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .panel-flip.is-flipped {
        transform: rotateY(180deg);
    }

    .flip-face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        display: flex;
        flex-direction: column;
    }

    .flip-front {
        transform: rotateY(0deg);
        justify-content: center;
    }

    .flip-back {
        transform: rotateY(180deg);
        justify-content: flex-start;
        padding-top: 0;
    }

    .otp-form {
        justify-content: flex-start !important;
    }

    .otp-action-area {
        position: relative;
        min-height: 100px;
    }

    .otp-verification-step {
        margin-top: -10px;
    }

    /* OTP form specific */
    .otp-header {
        text-align: center;
        margin-top: -20px;
        margin-bottom: 0px;
    }

    .otp-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 0px;
    }

    .otp-title {
        color: var(--text);
        font-size: 1.7rem;
        font-weight: 600;
        margin-bottom: 0;
        letter-spacing: -0.02em;
    }

    .otp-subtitle {
        color: var(--muted);
        font-size: 12px;
        max-width: 230px;
        margin: 0 auto;
    }

    .send-otp-btn,
    .verify-otp-btn {
        margin-bottom: 4px;
    }

    .otp-form .form-group {
        margin-bottom: 2px;
    }

    .otp-input-group {
        margin-top: 0;
        margin-bottom: 0px !important;
    }

    .login-card:hover {
        transform: translateY(-4px);
        box-shadow:
            26px 26px 70px rgba(190, 195, 207, 0.86),
            -26px -26px 70px rgba(255, 255, 255, 0.96);
    }

    .card-intro:hover,
    .card-main:hover {
        transform: translateY(-2px);
    }

    .card-main::before {
        content: "";
        position: absolute;
        top: 22px;
        left: 30px;
        right: 30px;
        height: 1px;
        background: linear-gradient(90deg, rgba(108, 114, 147, 0), rgba(108, 114, 147, 0.26), rgba(108, 114, 147, 0));
    }

    .login-header {
        text-align: left;
        margin-bottom: 0;
    }

    .neu-icon {
        width: 80px;
        height: 80px;
        margin: 0 0 20px;
        background: linear-gradient(145deg, #e6ebf2, #d9dee6);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
            8px 8px 20px rgba(190, 195, 207, 0.85),
            -8px -8px 20px rgba(255, 255, 255, 0.92),
            inset 0 0 0 rgba(190, 195, 207, 0),
            inset 0 0 0 rgba(255, 255, 255, 0);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .neu-icon:hover {
        box-shadow:
            4px 4px 10px rgba(190, 195, 207, 0.9),
            -4px -4px 10px rgba(255, 255, 255, 0.96),
            inset 4px 4px 10px rgba(190, 195, 207, 0.55),
            inset -4px -4px 10px rgba(255, 255, 255, 0.7);
    }

    .icon-inner {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6c7293;
    }

    .icon-inner svg {
        width: 100%;
        height: 100%;
    }

    .login-header h2 {
        color: var(--text);
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 8px;
        line-height: 1.1;
        letter-spacing: -0.03em;
    }

    .login-header p {
        color: var(--muted);
        font-size: 16px;
        font-weight: 400;
        max-width: 240px;
    }

    .intro-footer {
        margin-top: auto;
    }

    .login-form {
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100%;
        animation: contentFade 0.85s ease both;
        animation-delay: 0.1s;
    }

    .form-group {
        margin-bottom: 22px;
        position: relative;
    }

    .neu-input {
        position: relative;

</style>

<script>
    class NeumorphismLoginForm {
        constructor() {
            this.card = document.querySelector('.login-card');
            this.form = document.getElementById('loginForm');
            this.emailInput = document.getElementById('email');
            this.passwordInput = document.getElementById('password');
            this.passwordToggle = document.getElementById('passwordToggle');
            this.submitButton = this.form.querySelector('.login-btn');
            this.socialLogin = document.querySelector('.social-login');
            this.signupLink = this.form.querySelector('.signup-link');
            this.successMessage = document.getElementById('successMessage');
            this.socialButtons = document.querySelectorAll('.neu-social');

            this.init();
        }

        init() {
            this.bindEvents();
            this.setupCardMotion();
            this.setupPasswordToggle();
            this.setupSocialButtons();
            this.setupNeumorphicEffects();
        }

        setupCardMotion() {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReducedMotion || window.innerWidth <= 900) {
                return;
            }

            this.card.addEventListener('mousemove', (e) => {
                const rect = this.card.getBoundingClientRect();
                const offsetX = (e.clientX - rect.left) / rect.width - 0.5;
                const offsetY = (e.clientY - rect.top) / rect.height - 0.5;
                const rotateY = offsetX * 4;
                const rotateX = offsetY * -3;

                this.card.style.transform = `translateY(-4px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            this.card.addEventListener('mouseleave', () => {
                this.card.style.transform = '';
            });
        }

        bindEvents() {
            this.form.addEventListener('submit', (e) => this.handleSubmit(e));
            this.emailInput.addEventListener('blur', () => this.validateEmail());
            this.passwordInput.addEventListener('blur', () => this.validatePassword());
            this.emailInput.addEventListener('input', () => this.clearError('email'));
            this.passwordInput.addEventListener('input', () => this.clearError('password'));

            [this.emailInput, this.passwordInput].forEach(input => {
                input.addEventListener('focus', (e) => this.addSoftPress(e));
                input.addEventListener('blur', (e) => this.removeSoftPress(e));
            });
        }

        setupPasswordToggle() {
            this.passwordToggle.addEventListener('click', () => {
                const type = this.passwordInput.type === 'password' ? 'text' : 'password';
                this.passwordInput.type = type;

                this.passwordToggle.classList.toggle('show-password', type === 'text');
                this.animateSoftPress(this.passwordToggle);
            });
        }

        setupSocialButtons() {
            this.socialButtons.forEach(button => {
                button.addEventListener('click', () => {
                    this.animateSoftPress(button);
                });
            });
        }

        setupNeumorphicEffects() {
            const neuElements = document.querySelectorAll('.neu-icon, .neu-checkbox, .neu-social');
            neuElements.forEach(element => {
                element.addEventListener('mouseenter', () => {
                    element.style.transform = 'scale(1.05)';
                });

                element.addEventListener('mouseleave', () => {
                    element.style.transform = 'scale(1)';
                });
            });
        }

        addSoftPress(e) {
            const inputGroup = e.target.closest('.neu-input');
            inputGroup.style.transform = 'scale(0.98)';
        }

        removeSoftPress(e) {
            const inputGroup = e.target.closest('.neu-input');
            inputGroup.style.transform = 'scale(1)';
        }

        animateSoftPress(element) {
            const baseTransform = element.classList.contains('neu-toggle') ? 'translateY(-50%)' : '';
            element.style.transform = `${baseTransform} scale(0.95)`.trim();
            setTimeout(() => {
                element.style.transform = baseTransform;
            }, 150);
        }

        validateEmail() {
            const email = this.emailInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email) {
                this.showError('email', 'Email is required');
                return false;
            }

            if (!emailRegex.test(email)) {
                this.showError('email', 'Please enter a valid email');
                return false;
            }

            this.clearError('email');
            return true;
        }

        validatePassword() {
            const password = this.passwordInput.value;

            if (!password) {
                this.showError('password', 'Password is required');
                return false;
            }

            if (password.length < 6) {
                this.showError('password', 'Password must be at least 6 characters');
                return false;
            }

            this.clearError('password');
            return true;
        }

        showError(field, message) {
            const formGroup = document.getElementById(field).closest('.form-group');
            const errorElement = document.getElementById(`${field}Error`);

            formGroup.classList.add('error');
            errorElement.textContent = message;
            errorElement.classList.add('show');

            const input = document.getElementById(field);
            input.style.animation = 'gentleShake 0.5s ease-in-out';
            setTimeout(() => {
                input.style.animation = '';
            }, 500);
        }

        clearError(field) {
            const formGroup = document.getElementById(field).closest('.form-group');
            const errorElement = document.getElementById(`${field}Error`);

            formGroup.classList.remove('error');
            errorElement.classList.remove('show');
            setTimeout(() => {
                errorElement.textContent = '';
            }, 300);
        }

        async handleSubmit(e) {
            e.preventDefault();

            const isEmailValid = this.validateEmail();
            const isPasswordValid = this.validatePassword();

            if (!isEmailValid || !isPasswordValid) {
                this.animateSoftPress(this.submitButton);
                return;
            }

            this.setLoading(true);

            try {
                await new Promise(resolve => setTimeout(resolve, 2000));
                this.showNeumorphicSuccess();
            } catch (error) {
                this.showError('password', 'Login failed. Please try again.');
            } finally {
                this.setLoading(false);
            }
        }

        setLoading(loading) {
            this.submitButton.classList.toggle('loading', loading);
            this.submitButton.disabled = loading;

            this.socialButtons.forEach(button => {
                button.style.pointerEvents = loading ? 'none' : 'auto';
                button.style.opacity = loading ? '0.6' : '1';
            });
        }

        showNeumorphicSuccess() {
            this.form.style.transform = 'scale(0.95)';
            this.form.style.opacity = '0';

            setTimeout(() => {
                this.form.style.display = 'none';
                if (this.socialLogin) this.socialLogin.style.display = 'none';
                if (this.signupLink) this.signupLink.style.display = 'none';

                this.successMessage.classList.add('show');
                this.form.parentElement.appendChild(this.successMessage);

                const successIcon = this.successMessage.querySelector('.neu-icon');
                successIcon.style.animation = 'successPulse 0.6s ease-out';
            }, 300);
        }
    }

    if (!document.querySelector('#neu-keyframes')) {
        const style = document.createElement('style');
        style.id = 'neu-keyframes';
        style.textContent = `
        @keyframes gentleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        
        @keyframes successPulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    `;
        document.head.appendChild(style);
    }

    /* ── OTP Panel Flip Logic ── */
    function setupOtpFlip() {
        const flipPanel = document.getElementById('panelFlip');
        const goToPasswordTrigger = document.getElementById('passwordFlipTrigger');
        const goToOtpTrigger = document.getElementById('otpFlipTrigger');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const otpVerificationStep = document.getElementById('otpVerificationStep');
        const verifyBtn = document.getElementById('verifyOtpBtn');
        const phoneInput = document.getElementById('phone');
        const otpInput = document.getElementById('otp');
        const phoneError = document.getElementById('phoneError');
        const otpError = document.getElementById('otpError');

        /* Flip to Password side (from OTP front) */
        goToPasswordTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            flipPanel.classList.add('is-flipped');
        });

        /* Flip back to OTP side (from Password back) */
        goToOtpTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            flipPanel.classList.remove('is-flipped');
            /* Reset OTP form state if needed */
            sendOtpBtn.style.display = '';
            otpVerificationStep.style.display = 'none';
            phoneInput.value = '';
            otpInput.value = '';
            phoneError.textContent = '';
            phoneError.classList.remove('show');
            otpError.textContent = '';
            otpError.classList.remove('show');
        });

        /* Send OTP button */
        sendOtpBtn.addEventListener('click', () => {
            const phone = phoneInput.value.trim();
            if (!phone || !/^[\d\s\+\-\(\)]{7,15}$/.test(phone)) {
                phoneError.textContent = 'Please enter a valid phone number';
                phoneError.classList.add('show');
                phoneInput.style.animation = 'gentleShake 0.5s ease-in-out';
                setTimeout(() => { phoneInput.style.animation = ''; }, 500);
                return;
            }
            phoneError.classList.remove('show');

            /* Simulate sending OTP */
            sendOtpBtn.classList.add('loading');
            sendOtpBtn.disabled = true;
            setTimeout(() => {
                sendOtpBtn.classList.remove('loading');
                sendOtpBtn.disabled = false;
                sendOtpBtn.style.display = 'none';
                otpVerificationStep.style.display = 'block';
                otpInput.focus();
            }, 1500);
        });

        /* Verify OTP submit */
        document.getElementById('otpForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const otp = otpInput.value.trim();
            if (!otp || !/^\d{4,6}$/.test(otp)) {
                otpError.textContent = 'Please enter the OTP sent to your phone';
                otpError.classList.add('show');
                otpInput.style.animation = 'gentleShake 0.5s ease-in-out';
                setTimeout(() => { otpInput.style.animation = ''; }, 500);
                return;
            }
            otpError.classList.remove('show');

            verifyBtn.classList.add('loading');
            verifyBtn.disabled = true;
            setTimeout(() => {
                verifyBtn.classList.remove('loading');
                verifyBtn.disabled = false;
                /* Re-use the existing success state */
                const successMsg = document.getElementById('successMessage');
                const otpFormEl = document.getElementById('otpForm');

                otpFormEl.style.opacity = '0';
                otpFormEl.style.transform = 'scale(0.95)';

                setTimeout(() => {
                    otpFormEl.style.display = 'none';
                    successMsg.classList.add('show');
                    /* Append to the current face (should be flip-front now) */
                    otpFormEl.parentElement.appendChild(successMsg);
                }, 300);
            }, 1800);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        new NeumorphismLoginForm();
        setupOtpFlip();

        // Reveal observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("visible");
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll(".reveal").forEach((element) => observer.observe(element));

        // Dark/Light Mode Toggle
        const themeToggle = document.getElementById("theme-toggle-header");
        const themeIcon = themeToggle.querySelector(".theme-icon");
        const html = document.documentElement;

        const savedTheme = localStorage.getItem("theme") || "light";
        if (savedTheme === "dark") {
            html.style.filter = "invert(1)";
            themeIcon.textContent = "☀️";
        }

        themeToggle.addEventListener("click", () => {
            const isDark = html.style.filter === "invert(1)";
            if (isDark) {
                html.style.filter = "";
                localStorage.setItem("theme", "light");
                themeIcon.textContent = "🌙";
            } else {
                html.style.filter = "invert(1)";
                localStorage.setItem("theme", "dark");
                themeIcon.textContent = "☀️";
            }
        });
    });
</script>


</html>
